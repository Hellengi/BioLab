<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tab-control" id="tabControl" class="tab-panel active">
  <div class="panel-header-row">
    <h2>General Control</h2>
  </div>

  <div class="panel-section">
    <div class="panel-section-label">Cursor mode</div>
    <div class="cursor-mode-group">
      <button class="cursor-mode-btn active" data-mode="pan" title="Pan field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
        <span>Pan</span>
      </button>
      <button class="cursor-mode-btn" data-mode="drag-cell" title="Drag cell">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
        <span>Drag cell</span>
      </button>
      <button class="cursor-mode-btn" data-mode="inspect" title="Inspect">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span>Inspect</span>
      </button>
      <button class="cursor-mode-btn" data-mode="delete" title="Delete cell">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        <span>Delete</span>
      </button>
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-section-label">Cursor readout</div>
    <div class="cursor-readout-block">
      <div class="cursor-readout-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </div>
      <div class="cursor-readout-body">
        <div class="cursor-readout-label">Illumination at cursor</div>
        <div id="lightProbeDisplay" class="cursor-readout-value">&#x2014;</div>
      </div>
    </div>
  </div>

  <div class="accordion-group">
    <details class="accordion-item">
      <summary class="accordion-header">Display layers</summary>
      <div class="accordion-body">
        <div class="placeholder-block">
          <div class="placeholder-icon">&#x1F527;</div>
          <div class="placeholder-text">Layer toggles coming soon</div>
          <div class="placeholder-sub">Gas concentration, temperature field, energy gradient and more</div>
        </div>
      </div>
    </details>
    <details class="accordion-item">
      <summary class="accordion-header">Charts</summary>
      <div class="accordion-body">
        <div class="placeholder-block">
          <div class="placeholder-icon">&#x1F4C8;</div>
          <div class="placeholder-text">Charts coming soon</div>
          <div class="placeholder-sub">Population dynamics, energy flow, mutation rate over time</div>
        </div>
      </div>
    </details>
    <details class="accordion-item">
      <summary class="accordion-header">Language</summary>
      <div class="accordion-body">
        <div class="locale-list">
          <label class="locale-option active">
            <input type="radio" name="locale" value="en" checked>
            <span class="locale-flag">&#x1F1FA;&#x1F1F8;</span>
            <span>English</span>
          </label>
          <label class="locale-option disabled" title="Coming soon">
            <input type="radio" name="locale" value="ru" disabled>
            <span class="locale-flag">&#x1F1F7;&#x1F1FA;</span>
            <span>&#x420;&#x443;&#x441;&#x441;&#x43A;&#x438;&#x439;</span>
            <span class="locale-soon">soon</span>
          </label>
        </div>
      </div>
    </details>
  </div>
</div>
</body>
</html>
