<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="tab-logs" id="tabLogs" class="tab-panel hidden">
  <div class="panel-header-row">
    <h2>Event Log</h2>
  </div>
  <div class="log-info-entry">
    <div class="log-entry-icon">ℹ</div>
    <div>
      <div class="log-entry-title">Event log — coming soon</div>
      <div class="log-entry-body">
        This tab will display a real-time stream of simulation events, including:
        new mutations detected, species extinctions, population milestones,
        food scarcity alerts, energy spikes, and cell division bursts.
        Events will be filterable by type and severity.
      </div>
    </div>
  </div>
</div>

</body>
</html>
