spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/biolab
    username: postgres
    password: password
  jpa:
    hibernate.ddl-auto: update
    open-in-view: false

simulation:
  width: 1200
  height: 600
  tick-rate-ms: 10

  broadcast:
    fps: 100

  cell:
    initial-count: 20
    energy-min: 20.0
    energy-range: 20.0
    min-energy: 0.0
    energy-decay: 0.15
    viscosity: 0.995
    dead-lifetime-ticks: 80

  food:
    initial-count: 300
    spawn-intensity: 50
    spawn-max-multiplier: 20.0
    energy-min: 10.0
    energy-range: 10.0
    consumption-radius: 12.0

  spawn:
    center-x: 600.0
    center-y: 300.0
    offset-range: 20.0
    division-impulse-cost: 1.0
    min-child-energy: 1.0

  genome:
    radiation-chance: 0.08
    initial:
      division-threshold: 50.0
      division-impulse: 2.0
      color-hue: 195.0
      saturation: 100.0
      lightness: 62.0
      max-energy: 60.0
    mutation:
      division-threshold: 2.0
      division-impulse: 0.25
      color-hue: 12.0
      saturation: 8.0
      lightness: 6.0
      max-energy: 4.0
    limits:
      division-threshold:
        min: 20.0
        max: 100.0
      division-impulse:
        min: 0.5
        max: 6.0
      color-hue:
        min: 0.0
        max: 360.0
      saturation:
        min: 30.0
        max: 100.0
      lightness:
        min: 35.0
        max: 75.0
      max-energy:
        min: 20.0
        max: 200.0

  physics:
    collision-restitution: 1.0
    max-collision-substeps: 8
    max-collision-step-distance: 4.0

  time:
    min-speed-factor: 0.01
    max-speed-factor: 10.0
    min-temperature-celsius: -20.0
    normal-temperature-celsius: 20.0
    max-temperature-celsius: 60.0
    scale-slowdown-inside-tick: true
    scale-speedup-inside-tick: false

  render:
    cell-base-radius: 6.0
    cell-radius-scale: 4.0
    direction-vector-length: 12.0
    food-base-radius: 2.0